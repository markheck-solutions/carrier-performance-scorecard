name: CI Failure Issue

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  actions: read
  contents: read
  issues: write

jobs:
  file-insight:
    name: File or update CI failure issue
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Open deduplicated issue
        uses: actions/github-script@v9
        with:
          script: |
            const run = context.payload.workflow_run;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = run.head_branch || "unknown";
            const safeBranch = branch.replace(/[^A-Za-z0-9_.\/-]/g, "_").slice(0, 80);
            const marker = `<!-- ci-failure:${safeBranch} -->`;
            const title = `CI failure on ${safeBranch}`;
            const body = `${marker}
            ## CI Failure Insight

            The CI workflow failed and needs triage.

            - Workflow: ${run.name}
            - Branch: ${branch}
            - Commit: ${String(run.head_sha || "").slice(0, 12)}
            - Run: ${run.html_url}
            - Conclusion: ${run.conclusion}

            Start with the first failed command in the workflow log. Reproduce that command locally before changing code.
            `;

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "open",
              per_page: 100,
            });
            const existing = issues.find((issue) => !issue.pull_request && issue.body && issue.body.includes(marker));

            if (existing) {
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: existing.number,
                title,
                body,
              });
              core.notice(`Updated issue #${existing.number}`);
            } else {
              const created = await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
              });
              core.notice(`Created issue #${created.data.number}`);
            }
