name: CI

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 35
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: carrier_scorecard
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d carrier_scorecard"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NEXT_PUBLIC_DEMO_MODE: "true"
      AI_PROVIDER: mock
      DEMO_SEED_ALLOWLIST: carrier-performance-scorecard-demo
      NEXT_TELEMETRY_DISABLED: "1"
      PGHOST: 127.0.0.1
      PGPORT: "5432"
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: carrier_scorecard
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure local database URL
        run: printf 'DATABASE_URL=%s://%s:%s@%s:%s/%s\n' postgres "$PGUSER" "$PGPASSWORD" "$PGHOST" "$PGPORT" "$PGDATABASE" >> "$GITHUB_ENV"

      - name: Seed demo database
        run: npm run db:seed

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test -- --run

      - name: Coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Browser tests
        run: npm run test:browser

      - name: Upload Playwright report
        if: ${{ failure() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: warn
          retention-days: 14

      - name: Quality checks
        run: npm run quality:check

      - name: README verify
        run: npm run readme:verify

      - name: Safety audit
        run: npm run safety
