name: Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: Tag to release. Defaults to package.json version.
        required: false
        type: string
      dry_run:
        description: Validate only without creating a tag or release.
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  release:
    name: Validate and release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NEXT_PUBLIC_DEMO_MODE: "true"
      AI_PROVIDER: mock
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test -- --run

      - name: Build
        run: npm run build

      - name: Quality checks
        run: npm run quality:check

      - name: Resolve release metadata
        id: metadata
        uses: actions/github-script@v7
        with:
          script: |
            const pkg = require("./package.json");
            const requestedTag = core.getInput("tag_name").trim();
            const tagName = requestedTag || `v${pkg.version}`;
            core.setOutput("tag_name", tagName);
            core.notice(`Resolved release tag ${tagName}`);

      - name: Dry run summary
        if: ${{ inputs.dry_run }}
        run: |
          echo "Release dry run completed for ${{ steps.metadata.outputs.tag_name }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Create GitHub release
        if: ${{ !inputs.dry_run }}
        uses: actions/github-script@v7
        env:
          TAG_NAME: ${{ steps.metadata.outputs.tag_name }}
        with:
          script: |
            const tagName = process.env.TAG_NAME;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sha = context.sha;

            try {
              await github.rest.git.getRef({ owner, repo, ref: `tags/${tagName}` });
            } catch (error) {
              if (error.status !== 404) throw error;
              await github.rest.git.createRef({ owner, repo, ref: `refs/tags/${tagName}`, sha });
            }

            const notes = await github.rest.repos.generateReleaseNotes({
              owner,
              repo,
              tag_name: tagName,
            });

            try {
              const existing = await github.rest.repos.getReleaseByTag({ owner, repo, tag: tagName });
              await github.rest.repos.updateRelease({
                owner,
                repo,
                release_id: existing.data.id,
                name: notes.data.name || tagName,
                body: notes.data.body || "",
                draft: false,
                prerelease: false,
              });
              core.notice(`Updated release ${tagName}`);
            } catch (error) {
              if (error.status !== 404) throw error;
              await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: tagName,
                name: notes.data.name || tagName,
                body: notes.data.body || "",
                draft: false,
                prerelease: false,
              });
              core.notice(`Created release ${tagName}`);
            }
