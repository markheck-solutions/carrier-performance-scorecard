name: Droid Wiki Refresh

on:
  push:
    branches: [master]

jobs:
  wiki-refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - name: Install Factory Droid
        run: |
          curl -fsSL https://app.factory.ai/cli | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate wiki
        run: |
          set -o pipefail
          droid exec --cwd "$GITHUB_WORKSPACE" --auto high "/wiki" 2>&1 | tee droid-wiki-output.log
        env:
          FACTORY_API_KEY: ${{ secrets.FACTORY_API_KEY }}
          NEXT_PUBLIC_DEMO_MODE: "true"
          AI_PROVIDER: mock
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Upload wiki diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: droid-wiki-output
          path: droid-wiki-output.log
          if-no-files-found: warn
          retention-days: 14
